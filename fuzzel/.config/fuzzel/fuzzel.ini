font=JetBrainsMono Nerd Font:size=14
use-bold=no
fields=name,generic,comment,categories,filename,keywords
terminal=footclient  # Note: you cannot actually use environment variables here
minimal-lines=yes
width=30
dpi-aware=no

[colors]
background=171925ff
text=c5c8c6ff
message=ae8bffff
prompt=c5c8c6ff
placeholder=655686ff
input=c5c8c6ff
match=c5c8c6ff
selection=6fa8dcff
selection-text=111111ff
selection-match=bd2c40ff
counter=93a1a1ff
border=9b98ffff

[border]
width=2
radius=20

[key-bindings]
delete-line-forward=none
prev=Control+k Control+p Up
next=Control+j Control+n Down

